<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpapers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>WORKSPACE</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="wallpapers.html">Wallpapers</a>
            <a href="configs.html">Configs</a>
        </nav>
    </header>

    <main>
        <h2>Wallpapers</h2>
        <div class="wallpaper-list" id="gallery"></div>
    </main>

    <script>
        // Change "zoxv23" if your username is different
        const username = "zoxv23"; 
        
        // This targets your folder inside your GitHub repository
        const url = "https://api.github.com/repos/" + username + "/zoxv23.github.io/contents/wallpapers";
        const gallery = document.getElementById('gallery');

        fetch(url)
            .then(response => response.json())
            .then(files => {
                files.forEach(file => {
                    // Check if the file is an image by looking at the end of the name
                    if (file.name.endsWith('.jpg') || file.name.endsWith('.png') || file.name.endsWith('.webp')) {
                        const img = document.createElement('img');
                        img.src = file.path;
                        img.alt = file.name;
                        gallery.appendChild(img);
                    }
                });
            });
    </script>

</body>
</html>
